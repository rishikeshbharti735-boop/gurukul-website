<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Fees - Gurukul Aashram</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .payment-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #3228c5; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #3228c5; color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #f4b41a; color: #3228c5; }
        .back-link { display: block; margin-top: 15px; color: #666; font-size: 14px; text-decoration: none; }
    </style>
</head>
<body>

<div class="payment-card">
    <h2>Online Fees Payment</h2>
    <input type="text" id="studentName" placeholder="Student Full Name" required>
    <input type="text" id="studentClass" placeholder="Class (e.g. 10th)" required>
    <input type="number" id="feeAmount" placeholder="Enter Amount (₹)" required>
    <button onclick="startPayment()">Pay Now</button>
    <a href="index.html" class="back-link">← Back to Home</a>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    function startPayment() {
        const name = document.getElementById('studentName').value;
        const amount = document.getElementById('feeAmount').value;

        if (!name || !amount || amount <= 0) {
            alert("Please enter valid name and amount!");
            return;
        }

        // Tumhari Key ID (Frontend ke liye)
        const RAZORPAY_KEY = "rzp_test_SNWAKgO88lL2lq"; 

        fetch('/create-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount: amount })
        })
        .then(res => res.json())
        .then(order => {
            var options = {
                "key": RAZORPAY_KEY,
                "amount": order.amount,
                "currency": "INR",
                "name": "Gurukul Aashram",
                "description": "School Fees - " + name,
                "order_id": order.id,
                "handler": function (response) {
                    // Payment successful hone par database mein save karna
                    fetch('/save-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            student_name: name,
                            amount: amount,
                            payment_id: response.razorpay_payment_id
                        })
                    }).then(() => {
                        alert("✅ ₹" + amount + " Paid Successfully! Payment ID: " + response.razorpay_payment_id);
                        window.location.href = "index.html";
                    });
                },
                "prefill": { "name": name },
                "theme": { "color": "#3228c5" }
            };
            var rzp = new Razorpay(options);
            rzp.open();
        })
        .catch(err => alert("❌ Error: " + err.message));
    }
</script>

</body>
</html>
