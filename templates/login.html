<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Gurukul Aashram</title>
    <style>
        /* Poore page ko beech mein lane ke liye */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1c1a76 0%, #3f51b5 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
        }

        /* Login Card ka design */
        .login-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-card img {
            height: 80px;
            margin-bottom: 15px;
        }

        .login-card h2 {
            color: #1c1a76;
            margin-bottom: 5px;
            font-size: 1.5rem;
        }

        .login-card p {
            color: #666;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        /* Input fields styling */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: #1c1a76;
            box-shadow: 0 0 5px rgba(28, 26, 118, 0.2);
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #1c1a76;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #d32f2f;
        }

        /* Flash messages (Error dikhane ke liye) */
        .flash-msg {
            background: #fdeaea;
            color: #d32f2f;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            border: 1px solid #facccc;
        }

        .home-link {
            display: block;
            margin-top: 20px;
            color: #1c1a76;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="{{ url_for('static', filename='images/School_logo.jpeg') }}" alt="School Logo">
        <h2>Admin Login</h2>
        <p>Gurukul Aashram Control Center</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash-msg">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/admin_login" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Admin ID daalein" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Password daalein" required>
            </div>

            <button type="submit" class="login-btn">LOGIN NOW</button>
        </form>

        <a href="/" class="home-link">🏠 Back to Home</a>
    </div>

</body>
</html>
