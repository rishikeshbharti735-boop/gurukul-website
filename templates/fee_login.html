<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts Login - Gurukul Aashram</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@500;600;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0d1b4b; --navy-mid: #1e3575;
            --gold: #c9a84c; --gold-light: #f5e6bb; --gold-pale: #fdf8ed;
            --green-mid: #2e7d32; --red: #c62828;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Crimson Text', Georgia, serif;
            min-height: 100vh; background: var(--navy);
            display: flex; align-items: center; justify-content: center;
            padding: 20px; position: relative; overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                radial-gradient(ellipse at 20% 30%, rgba(201,168,76,0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(30,53,117,0.5) 0%, transparent 50%),
                repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(201,168,76,0.02) 40px, rgba(201,168,76,0.02) 41px);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: 'GURUKUL';
            position: fixed; bottom: -20px; right: -30px;
            font-family: 'Playfair Display', serif;
            font-size: 180px; font-weight: 900;
            color: rgba(201,168,76,0.04);
            pointer-events: none; z-index: 0; line-height: 1;
        }
        .login-card {
            width: 100%; max-width: 390px;
            background: var(--gold-pale); border: 2px solid var(--gold);
            box-shadow: 0 0 0 6px rgba(201,168,76,0.10), 0 32px 80px rgba(0,0,0,0.5);
            position: relative; z-index: 1; overflow: hidden;
        }
        .login-card::before {
            content: ''; position: absolute; inset: 0;
            background: repeating-linear-gradient(45deg, transparent, transparent 28px, rgba(201,168,76,0.03) 28px, rgba(201,168,76,0.03) 29px);
            pointer-events: none; z-index: 0;
        }
        .corner { position: absolute; width: 36px; height: 36px; pointer-events: none; z-index: 3; }
        .corner.tl { top: -1px; left: -1px; }
        .corner.tr { top: -1px; right: -1px; transform: scaleX(-1); }
        .corner.bl { bottom: -1px; left: -1px; transform: scaleY(-1); }
        .corner.br { bottom: -1px; right: -1px; transform: scale(-1); }
        .card-header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
            border-bottom: 3px solid var(--gold);
            padding: 22px 24px 18px; text-align: center;
            position: relative; z-index: 2;
        }
        .card-header::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.10) 0%, transparent 60%);
            pointer-events: none;
        }
        .header-logo {
            height: 60px; width: auto; object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
            margin-bottom: 10px; position: relative; z-index: 1;
        }
        .school-name {
            font-family: 'Playfair Display', serif;
            font-size: 20px; font-weight: 900;
            color: var(--gold-light); letter-spacing: 2.5px;
            position: relative; z-index: 1;
        }
        .school-name em { color: var(--gold); font-style: normal; }
        .school-loc {
            font-family: 'Cormorant Garamond', serif;
            font-size: 9.5px; color: rgba(245,230,187,0.55);
            letter-spacing: 2px; text-transform: uppercase; margin-top: 3px;
            position: relative; z-index: 1;
        }
        .gold-rule {
            height: 1.5px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 10px 30px 0; position: relative; z-index: 1;
        }
        .login-badge {
            display: inline-block;
            background: var(--green-mid); color: white;
            font-family: 'Cormorant Garamond', serif;
            font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
            padding: 4px 18px; margin-top: 10px; border-radius: 20px;
            position: relative; z-index: 1;
            box-shadow: 0 2px 10px rgba(46,125,50,0.35);
        }
        .card-body { padding: 24px 26px 20px; position: relative; z-index: 2; }
        .lock-icon {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--navy), var(--navy-mid));
            border: 2px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; margin: 0 auto 14px;
            box-shadow: 0 4px 16px rgba(13,27,75,0.3);
        }
        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 16px; font-weight: 700; color: var(--navy);
            text-align: center; letter-spacing: 1px; margin-bottom: 4px;
        }
        .card-sub {
            font-family: 'Cormorant Garamond', serif;
            font-size: 11px; color: #aaa;
            text-align: center; letter-spacing: 1.5px; text-transform: uppercase;
            margin-bottom: 22px;
        }
        .error-msg {
            background: #ffebee; border-left: 3px solid var(--red);
            color: var(--red); font-family: 'Cormorant Garamond', serif;
            font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
            padding: 8px 14px; margin-bottom: 16px;
        }
        .field-group { margin-bottom: 14px; }
        .field-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 10px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--navy); opacity: 0.65;
            display: block; margin-bottom: 5px;
        }
        .field-group input {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid #d4c8a0;
            font-family: 'Crimson Text', serif;
            font-size: 15px; color: var(--navy);
            background: white; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field-group input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.14);
            background: #fffef8;
        }
        .field-group input::placeholder { color: #ccc; font-style: italic; }
        .submit-btn {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, var(--green-mid) 0%, #1b5e20 100%);
            color: white; border: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            cursor: pointer; margin-top: 6px;
            transition: all 0.25s;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        .submit-btn:hover { letter-spacing: 4px; opacity: 0.92; }
        .back-row { text-align: center; margin-top: 16px; }
        .back-link {
            text-decoration: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: 10.5px; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--navy); opacity: 0.4; transition: opacity 0.2s;
        }
        .back-link:hover { opacity: 0.9; }
        .card-footer {
            background: var(--navy); border-top: 2px solid var(--gold);
            padding: 7px; text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 8.5px; color: rgba(201,168,76,0.4);
            letter-spacing: 2px; text-transform: uppercase;
            position: relative; z-index: 2;
        }
        .also-login {
            text-align: center; margin-top: 14px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 10.5px; color: rgba(245,230,187,0.35); letter-spacing: 1px;
            position: relative; z-index: 1;
        }
        .also-login a {
            color: rgba(201,168,76,0.6); text-decoration: none;
            font-weight: 700; transition: color 0.2s;
        }
        .also-login a:hover { color: var(--gold); }
    </style>
</head>
<body>

<div class="login-card">

    <!-- Corners -->
    <div class="corner tl"><svg viewBox="0 0 36 36" fill="none"><path d="M2 2 L13 2" stroke="#c9a84c" stroke-width="1.8"/><path d="M2 2 L2 13" stroke="#c9a84c" stroke-width="1.8"/><circle cx="2" cy="2" r="2" fill="#c9a84c"/><path d="M5 2 Q9 5 9 9 Q5 9 2 5" stroke="#c9a84c" stroke-width="0.6" fill="none"/></svg></div>
    <div class="corner tr"><svg viewBox="0 0 36 36" fill="none"><path d="M2 2 L13 2" stroke="#c9a84c" stroke-width="1.8"/><path d="M2 2 L2 13" stroke="#c9a84c" stroke-width="1.8"/><circle cx="2" cy="2" r="2" fill="#c9a84c"/><path d="M5 2 Q9 5 9 9 Q5 9 2 5" stroke="#c9a84c" stroke-width="0.6" fill="none"/></svg></div>
    <div class="corner bl"><svg viewBox="0 0 36 36" fill="none"><path d="M2 2 L13 2" stroke="#c9a84c" stroke-width="1.8"/><path d="M2 2 L2 13" stroke="#c9a84c" stroke-width="1.8"/><circle cx="2" cy="2" r="2" fill="#c9a84c"/><path d="M5 2 Q9 5 9 9 Q5 9 2 5" stroke="#c9a84c" stroke-width="0.6" fill="none"/></svg></div>
    <div class="corner br"><svg viewBox="0 0 36 36" fill="none"><path d="M2 2 L13 2" stroke="#c9a84c" stroke-width="1.8"/><path d="M2 2 L2 13" stroke="#c9a84c" stroke-width="1.8"/><circle cx="2" cy="2" r="2" fill="#c9a84c"/><path d="M5 2 Q9 5 9 9 Q5 9 2 5" stroke="#c9a84c" stroke-width="0.6" fill="none"/></svg></div>

    <!-- Header -->
    <div class="card-header">
        <img class="header-logo"
             src="{{ url_for('static', filename='images/School_logo.jpeg') }}"
             alt="Logo" onerror="this.style.display='none'">
        <div class="school-name">GURUKUL <em>AASHRAM</em></div>
        <div class="school-loc">Ulao, Begusarai, Bihar</div>
        <div class="gold-rule"></div>
        <div class="login-badge">✦ Accounts Access ✦</div>
    </div>

    <!-- Body -->
    <div class="card-body">

        <div class="lock-icon">💳</div>
        <div class="card-title">Fee Dashboard Login</div>
        <div class="card-sub">Authorized Personnel Only</div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="error-msg">❌ &nbsp; {{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form action="/fee_login" method="POST">
            <div class="field-group">
                <label class="field-label">Accounts ID</label>
                <input type="text" name="username"
                       placeholder="Enter accounts ID" required autocomplete="off">
            </div>
            <div class="field-group">
                <label class="field-label">Password</label>
                <input type="password" name="password"
                       placeholder="Enter password" required>
            </div>
            <button type="submit" class="submit-btn">🔓 &nbsp; Unlock Dashboard</button>
        </form>

        <div class="back-row">
            <a href="/" class="back-link">← Back to Home</a>
        </div>

    </div>

    <div class="card-footer">
        Gurukul Aashram &nbsp;✦&nbsp; Restricted Access
    </div>

</div>

<div class="also-login">
    Admin login? <a href="/admin_login">Admin Portal →</a>
</div>

</body>
</html>
