<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Result - Gurukul Aashram</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 500px; text-align: center;">
        <div class="header" style="justify-content: center; border-bottom: none;">
            <img src="{{ url_for('static', filename='images/School_logo.jpeg') }}" alt="Logo" style="height: 90px;">
        </div>
        
        <h2 style="color: #1c1a76; margin-bottom: 25px; text-transform: uppercase;">Exam Result Search</h2>
        
        <form action="/identify_class" method="POST">
    <div class="form-group">
        <label>Select Your Class</label>
        <select name="class_name" required>
            <option value="">-- Choose Class --</option>
            <option value="Nursery">Nursery</option>
            <option value="L.KG">L.KG</option>
            <option value="U.KG">U.KG</option>
            <option value="1st">1st</option>
            <option value="2nd">2nd</option>
            <option value="3rd">3rd</option>
            <option value="4th">4th</option>
            <option value="5th">5th</option>
            <option value="6th">6th</option>
            <option value="7th">7th</option>
            <option value="8th">8th</option>
            <option value="9th">9th</option>
            <option value="10th">10th</option>
        </select>
    </div>
    <button type="submit" class="btn">NEXT STEP →</button>
</form>
        
        <div style="margin-top: 25px;">
            <a href="/" style="color: #1c1a76; text-decoration: none; font-weight: bold;">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
