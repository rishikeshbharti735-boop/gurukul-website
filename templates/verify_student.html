<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Student - Gurukul Aashram</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 500px; text-align: center; margin-top: 50px;">
        <div class="header" style="justify-content: center; border-bottom: none;">
            <img src="{{ url_for('static', filename='images/School_logo.jpeg') }}" alt="Logo" style="height: 80px;">
        </div>
        
        <h2 style="color: #1c1a76; margin-bottom: 10px;">STUDENT VERIFICATION</h2>
        <p style="background: #f1ed71; display: inline-block; padding: 5px 15px; border-radius: 5px; font-weight: bold;">
            Class: {{ selected_class }}
        </p>

        <form action="/view_result" method="POST" style="margin-top: 25px;">
            <input type="hidden" name="class_name" value="{{ selected_class }}">
            
            <div class="form-group" style="text-align: left;">
                <label>Student Full Name (As per Records)</label>
                <input type="text" name="student_name" placeholder="Enter Full Name" required>
            </div>

            <div class="form-group" style="text-align: left;">
                <label>Roll Number / Registration No.</label>
                <input type="text" name="roll_no" placeholder="Enter Roll Number" required>
            </div>

            <button type="submit" class="btn">VIEW MARKSHEET</button>
        </form>
        
        <div style="margin-top: 20px;">
            <a href="/result_search" style="color: #666; text-decoration: none;">← Change Class</a>
        </div>
    </div>
</body>
</html>
